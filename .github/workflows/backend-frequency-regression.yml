name: Backend Frequency Regression

on:
  push:
    paths:
      - "backend-cloudrun/app/**"
      - "backend-cloudrun/tests/**"
      - "backend-cloudrun/requirements-test.txt"
      - ".github/workflows/backend-frequency-regression.yml"
  pull_request:
    paths:
      - "backend-cloudrun/app/**"
      - "backend-cloudrun/tests/**"
      - "backend-cloudrun/requirements-test.txt"
      - ".github/workflows/backend-frequency-regression.yml"

jobs:
  backend-regressions:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend-cloudrun

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend-cloudrun/requirements-test.txt

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Run backend regression tests
        run: pytest tests/test_ai_report_frequency_regression.py tests/test_latest_data_status_regression.py tests/test_openapi_integration_endpoints.py -q
