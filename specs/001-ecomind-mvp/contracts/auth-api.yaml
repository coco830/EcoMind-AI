openapi: 3.0.3
info:
  title: EcoMind-AI Authentication API
  description: 用户认证相关接口
  version: 1.0.0

paths:
  /api/auth/login:
    post:
      summary: 用户登录
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          headers:
            Set-Cookie:
              schema:
                type: string
              description: JWT Token in HttpOnly cookie
        '401':
          description: 认证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/logout:
    post:
      summary: 用户登出
      tags:
        - Authentication
      security:
        - cookieAuth: []
      responses:
        '200':
          description: 登出成功
        '401':
          description: 未认证

  /api/auth/me:
    get:
      summary: 获取当前用户信息
      tags:
        - Authentication
      security:
        - cookieAuth: []
      responses:
        '200':
          description: 用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: 未认证

  /api/auth/password:
    put:
      summary: 修改密码
      tags:
        - Authentication
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: 修改成功
        '400':
          description: 原密码错误
        '401':
          description: 未认证

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token

  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: admin
        password:
          type: string
          minLength: 8
          maxLength: 32
          format: password

    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserResponse'
        expires_at:
          type: string
          format: date-time

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, operator, viewer]
        organization_id:
          type: string
          format: uuid
        organization_name:
          type: string
        last_login:
          type: string
          format: date-time

    ChangePasswordRequest:
      type: object
      required:
        - old_password
        - new_password
      properties:
        old_password:
          type: string
          format: password
        new_password:
          type: string
          minLength: 8
          maxLength: 32
          format: password

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
